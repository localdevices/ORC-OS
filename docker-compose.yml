services:
  redis:
    image: redis:8.6.2-alpine
    container_name: orc-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - orc-network

  orcapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orc-api
    restart: unless-stopped
    mem_limit: 8g
    memswap_limit: 8g
    environment:
      - ORC_HOME=/app/data
      - ORC_UPLOAD_DIRECTORY=/app/data/uploads
      - ORC_INCOMING_DIRECTORY=/app/data/uploads/incoming
      - ORC_SECRET_KEY=${ORC_SECRET_KEY}
      - ORC_DEV_MODE=${ORC_DEV_MODE:-0}
      - ORC_CELERY_BROKER_URL=redis://redis:6379/0
      - ORC_CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ${ORC_DATA_PATH:-./data}:/app/data
    ports:
      - "3001:5000"
    depends_on:
      redis:
        condition: service_started
    networks:
      - orc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/api/ | grep -qE '^(200|401)$'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orc-celery-worker
    restart: unless-stopped
    environment:
      - ORC_HOME=/app/data
      - ORC_UPLOAD_DIRECTORY=/app/data/uploads
      - ORC_INCOMING_DIRECTORY=/app/data/uploads/incoming
      - ORC_SECRET_KEY=${ORC_SECRET_KEY}
      - ORC_DEV_MODE=${ORC_DEV_MODE:-0}
      - ORC_CELERY_BROKER_URL=redis://redis:6379/0
      - ORC_CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ${ORC_DATA_PATH:-./data}:/app/data
    command: ["celery", "-A", "orc_api.celery_app", "worker", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_started
      orcapi:
        condition: service_healthy
    networks:
      - orc-network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orc-celery-beat
    restart: unless-stopped
    environment:
      - ORC_HOME=/app/data
      - ORC_UPLOAD_DIRECTORY=/app/data/uploads
      - ORC_INCOMING_DIRECTORY=/app/data/uploads/incoming
      - ORC_SECRET_KEY=${ORC_SECRET_KEY}
      - ORC_DEV_MODE=${ORC_DEV_MODE:-0}
      - ORC_CELERY_BROKER_URL=redis://redis:6379/0
      - ORC_CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ${ORC_DATA_PATH:-./data}:/app/data
    command: ["celery", "-A", "orc_api.celery_app", "beat", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_started
      orcapi:
        condition: service_healthy
    networks:
      - orc-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: orc-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      orcapi:
        condition: service_healthy
    networks:
      - orc-network

networks:
  orc-network:
    driver: bridge
